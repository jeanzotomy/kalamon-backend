# ============================================================
# KALAMON BACKEND — Intégration Continue
#
# Déclenché sur : push (toutes branches) + PR vers main/master
# Jobs :
#   lint-and-test  : TypeScript check + tests Jest
#   docker-build   : build image (uniquement sur main/master après tests verts)
# ============================================================

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    name: TypeScript + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      # npm ci sans --ignore-scripts (Prisma postinstall requis)
      - name: Install dependencies
        run: npm ci

      # Génération client Prisma (requis avant tsc)
      - name: Generate Prisma client
        run: node node_modules/prisma/build/index.js generate

      # Type-check strict (jamais any, jamais as)
      - name: TypeScript type check
        run: npx tsc --noEmit

      # Tests Jest — --passWithNoTests évite l'échec sur suite vide
      - name: Run tests
        run: npm test -- --passWithNoTests
        env:
          NODE_ENV: test
          # DATABASE_URL non requis pour les tests unitaires avec mocks
          # Ajouter ici un DATABASE_URL de test si les tests d'intégration
          # nécessitent une vraie DB (utiliser un secret GitHub ou un service container)

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint-and-test
    # Uniquement sur push vers main ou master (pas sur les branches de feature)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build l'image avec le SHA du commit comme tag — reproductible
      - name: Build Docker image
        run: |
          docker build \
            --tag kalamon-backend:${{ github.sha }} \
            --tag kalamon-backend:latest \
            --file Dockerfile \
            .
        # openssl est installé via apk dans le Dockerfile Alpine
        # npm ci SANS --ignore-scripts (Prisma postinstall)
        # startup.sh applique prisma migrate deploy avant le démarrage
