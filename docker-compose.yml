# Kalamon — dev local + CI
# Pré-requis une seule fois apres "docker compose up -d db" :
#   docker compose exec db psql -U kalamon kalamon \
#     -c "CREATE EXTENSION IF NOT EXISTS vector;"
# Puis creer les index HNSW via prisma migrate deploy (startup.sh le fait).

name: kalamon

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: kalamon
      POSTGRES_PASSWORD: kalamon
      POSTGRES_DB: kalamon
    ports:
      - "5432:5432"
    volumes:
      - kalamon_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalamon"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://kalamon:kalamon@db:5432/kalamon?schema=public
      NODE_ENV: development
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  kalamon_db:
